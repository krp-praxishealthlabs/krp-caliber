<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="scoreGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <rect width="40" height="40" fill="none" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.03"/>
  </pattern>
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- Logo icon: 3 gradient bars -->
  <rect x="100" y="158" width="32" height="8" rx="3" fill="#fdba74"/>
  <rect x="90" y="174" width="56" height="8" rx="3" fill="#fb923c"/>
  <rect x="80" y="190" width="80" height="8" rx="3" fill="#f97316"/>

  <!-- CALIBER text -->
  <text x="180" y="192" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-weight="700" font-size="48" letter-spacing="0.12em" fill="#f97316" dominant-baseline="central">CALIBER</text>

  <!-- Tagline -->
  <text x="100" y="252" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="400" font-size="24" fill="#a1a1aa" dominant-baseline="central">Onboard your project for AI-assisted development</text>

  <!-- Divider -->
  <rect x="100" y="290" width="60" height="2" rx="1" fill="#f97316" opacity="0.4"/>

  <!-- Flow steps -->
  <text x="100" y="340" font-family="'SF Mono', 'Fira Code', monospace" font-weight="600" font-size="15" fill="#71717a">$</text>
  <text x="120" y="340" font-family="'SF Mono', 'Fira Code', monospace" font-weight="400" font-size="15" fill="#e4e4e7">npx @rely-ai/caliber onboard</text>

  <!-- Steps visualization -->
  <g transform="translate(100, 375)">
    <!-- Step circles + labels -->
    <circle cx="0" cy="0" r="14" fill="none" stroke="#f97316" stroke-width="2"/>
    <text x="0" y="1" font-family="'SF Mono', monospace" font-size="12" fill="#f97316" text-anchor="middle" dominant-baseline="central">1</text>
    <text x="0" y="32" font-family="-apple-system, sans-serif" font-size="12" fill="#71717a" text-anchor="middle">Connect</text>

    <line x1="20" y1="0" x2="70" y2="0" stroke="#27272a" stroke-width="2"/>

    <circle cx="90" cy="0" r="14" fill="none" stroke="#f97316" stroke-width="2"/>
    <text x="90" y="1" font-family="'SF Mono', monospace" font-size="12" fill="#f97316" text-anchor="middle" dominant-baseline="central">2</text>
    <text x="90" y="32" font-family="-apple-system, sans-serif" font-size="12" fill="#71717a" text-anchor="middle">Discover</text>

    <line x1="110" y1="0" x2="160" y2="0" stroke="#27272a" stroke-width="2"/>

    <circle cx="180" cy="0" r="14" fill="none" stroke="#f97316" stroke-width="2"/>
    <text x="180" y="1" font-family="'SF Mono', monospace" font-size="12" fill="#f97316" text-anchor="middle" dominant-baseline="central">3</text>
    <text x="180" y="32" font-family="-apple-system, sans-serif" font-size="12" fill="#71717a" text-anchor="middle">Generate</text>

    <line x1="200" y1="0" x2="250" y2="0" stroke="#27272a" stroke-width="2"/>

    <circle cx="270" cy="0" r="14" fill="none" stroke="#f97316" stroke-width="2"/>
    <text x="270" y="1" font-family="'SF Mono', monospace" font-size="12" fill="#f97316" text-anchor="middle" dominant-baseline="central">4</text>
    <text x="270" y="32" font-family="-apple-system, sans-serif" font-size="12" fill="#71717a" text-anchor="middle">Review</text>

    <line x1="290" y1="0" x2="340" y2="0" stroke="#27272a" stroke-width="2"/>

    <circle cx="360" cy="0" r="14" fill="none" stroke="#f97316" stroke-width="2"/>
    <text x="360" y="1" font-family="'SF Mono', monospace" font-size="12" fill="#f97316" text-anchor="middle" dominant-baseline="central">5</text>
    <text x="360" y="32" font-family="-apple-system, sans-serif" font-size="12" fill="#71717a" text-anchor="middle">MCP</text>

    <line x1="380" y1="0" x2="430" y2="0" stroke="#27272a" stroke-width="2"/>

    <circle cx="450" cy="0" r="14" fill="none" stroke="#22c55e" stroke-width="2"/>
    <text x="450" y="1" font-family="'SF Mono', monospace" font-size="12" fill="#22c55e" text-anchor="middle" dominant-baseline="central">✓</text>
    <text x="450" y="32" font-family="-apple-system, sans-serif" font-size="12" fill="#71717a" text-anchor="middle">Skills</text>
  </g>

  <!-- Supported platforms -->
  <g transform="translate(100, 460)">
    <text x="0" y="0" font-family="-apple-system, sans-serif" font-size="13" fill="#52525b" dominant-baseline="central">Works with</text>
    <!-- Claude Code pill -->
    <rect x="90" y="-12" width="110" height="24" rx="12" fill="#18181b" stroke="#27272a" stroke-width="1"/>
    <text x="145" y="0" font-family="-apple-system, sans-serif" font-size="12" fill="#a1a1aa" text-anchor="middle" dominant-baseline="central">Claude Code</text>
    <!-- Cursor pill -->
    <rect x="210" y="-12" width="78" height="24" rx="12" fill="#18181b" stroke="#27272a" stroke-width="1"/>
    <text x="249" y="0" font-family="-apple-system, sans-serif" font-size="12" fill="#a1a1aa" text-anchor="middle" dominant-baseline="central">Cursor</text>
    <!-- Codex pill -->
    <rect x="298" y="-12" width="72" height="24" rx="12" fill="#18181b" stroke="#27272a" stroke-width="1"/>
    <text x="334" y="0" font-family="-apple-system, sans-serif" font-size="12" fill="#a1a1aa" text-anchor="middle" dominant-baseline="central">Codex</text>
  </g>

  <!-- Right side: Score card mockup -->
  <g transform="translate(720, 140)">
    <rect x="0" y="0" width="440" height="400" rx="12" fill="#111111" stroke="#27272a" stroke-width="1"/>

    <!-- Score header -->
    <text x="30" y="45" font-family="'SF Mono', monospace" font-weight="700" font-size="18" fill="#22c55e">Config Score: 87/100 (A) ✨</text>

    <!-- Score bars -->
    <g transform="translate(30, 75)">
      <text x="0" y="0" font-family="'SF Mono', monospace" font-size="12" fill="#a1a1aa" dominant-baseline="central">FILES &amp; SETUP</text>
      <text x="160" y="0" font-family="'SF Mono', monospace" font-size="12" fill="#71717a" dominant-baseline="central">22/25</text>
      <rect x="210" y="-6" width="176" height="12" rx="3" fill="#1a1a1a"/>
      <rect x="210" y="-6" width="155" height="12" rx="3" fill="url(#scoreGrad)"/>

      <text x="0" y="32" font-family="'SF Mono', monospace" font-size="12" fill="#a1a1aa" dominant-baseline="central">QUALITY</text>
      <text x="160" y="32" font-family="'SF Mono', monospace" font-size="12" fill="#71717a" dominant-baseline="central">21/25</text>
      <rect x="210" y="26" width="176" height="12" rx="3" fill="#1a1a1a"/>
      <rect x="210" y="26" width="148" height="12" rx="3" fill="url(#scoreGrad)"/>

      <text x="0" y="64" font-family="'SF Mono', monospace" font-size="12" fill="#a1a1aa" dominant-baseline="central">COVERAGE</text>
      <text x="160" y="64" font-family="'SF Mono', monospace" font-size="12" fill="#71717a" dominant-baseline="central">18/20</text>
      <rect x="210" y="58" width="176" height="12" rx="3" fill="#1a1a1a"/>
      <rect x="210" y="58" width="158" height="12" rx="3" fill="url(#scoreGrad)"/>

      <text x="0" y="96" font-family="'SF Mono', monospace" font-size="12" fill="#a1a1aa" dominant-baseline="central">ACCURACY</text>
      <text x="160" y="96" font-family="'SF Mono', monospace" font-size="12" fill="#71717a" dominant-baseline="central">13/15</text>
      <rect x="210" y="90" width="176" height="12" rx="3" fill="#1a1a1a"/>
      <rect x="210" y="90" width="152" height="12" rx="3" fill="url(#scoreGrad)"/>

      <text x="0" y="128" font-family="'SF Mono', monospace" font-size="12" fill="#a1a1aa" dominant-baseline="central">FRESHNESS</text>
      <text x="160" y="128" font-family="'SF Mono', monospace" font-size="12" fill="#71717a" dominant-baseline="central">8/10</text>
      <rect x="210" y="122" width="176" height="12" rx="3" fill="#1a1a1a"/>
      <rect x="210" y="122" width="141" height="12" rx="3" fill="url(#scoreGrad)"/>

      <text x="0" y="160" font-family="'SF Mono', monospace" font-size="12" fill="#a1a1aa" dominant-baseline="central">BONUS</text>
      <text x="160" y="160" font-family="'SF Mono', monospace" font-size="12" fill="#71717a" dominant-baseline="central">5/5</text>
      <rect x="210" y="154" width="176" height="12" rx="3" fill="#1a1a1a"/>
      <rect x="210" y="154" width="176" height="12" rx="3" fill="url(#scoreGrad)"/>
    </g>

    <!-- Divider -->
    <rect x="30" y="262" width="380" height="1" fill="#27272a"/>

    <!-- Generated files -->
    <text x="30" y="290" font-family="'SF Mono', monospace" font-size="12" fill="#71717a">Generated files:</text>

    <text x="30" y="316" font-family="'SF Mono', monospace" font-size="12" fill="#22c55e">+</text>
    <text x="48" y="316" font-family="'SF Mono', monospace" font-size="12" fill="#e4e4e7">CLAUDE.md</text>

    <text x="30" y="340" font-family="'SF Mono', monospace" font-size="12" fill="#22c55e">+</text>
    <text x="48" y="340" font-family="'SF Mono', monospace" font-size="12" fill="#e4e4e7">.cursor/rules/project.mdc</text>

    <text x="30" y="364" font-family="'SF Mono', monospace" font-size="12" fill="#22c55e">+</text>
    <text x="48" y="364" font-family="'SF Mono', monospace" font-size="12" fill="#e4e4e7">AGENTS.md</text>

    <text x="30" y="388" font-family="'SF Mono', monospace" font-size="12" fill="#22c55e">+</text>
    <text x="48" y="388" font-family="'SF Mono', monospace" font-size="12" fill="#e4e4e7">.claude/skills/</text>
    <text x="168" y="388" font-family="'SF Mono', monospace" font-size="12" fill="#71717a">testing, deploy</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="620" width="1280" height="20" fill="#f97316" opacity="0.08"/>
  <text x="640" y="607" font-family="-apple-system, sans-serif" font-size="13" fill="#52525b" text-anchor="middle">github.com/rely-ai-org/caliber</text>
</svg>
